name: tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      PYTHONUNBUFFERED: "1"
      UV_CACHE_DIR: .uv-cache
      TESTCONTAINERS_RYUK_DISABLED: "false"
      BOT_TEST_GATE_MODE: ci
      BOT_TEST_COVERAGE_FAIL_UNDER: "90"
      BOT_TEST_JUNIT_XML: reports/junit.xml
      BOT_TEST_COVERAGE_XML: reports/coverage.xml
      BOT_TEST_DURATIONS: "10"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Pre-pull Postgres image for Testcontainers
        run: |
          docker pull postgres:16-alpine

      - name: Run tests
        run: |
          mkdir -p reports
          PYTHONPATH=src uv run --extra dev python -m bot.test_gate

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports
