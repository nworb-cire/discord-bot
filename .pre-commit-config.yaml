repos:
  - repo: local
    hooks:
      - id: black
        name: Black (uv)
        entry: uv
        args:
          - run
          - --no-sync
          - black
          - --config
          - pyproject.toml
        language: system
        types: [python]

      - id: ruff
        name: Ruff (uv)
        entry: uv
        args:
          - run
          - --no-sync
          - ruff
          - check
          - --fix
        language: system
        types: [python]

  - repo: local
    hooks:
      - id: unit-tests
        name: Run impacted unit tests
        entry: bash
        args:
          - -c
          - PYTHONPATH=src BOT_TEST_GATE_MODE=pre-commit UV_CACHE_DIR=.uv-cache uv run --extra dev python -m bot.test_gate
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: unit-tests-full
        name: Run full unit tests with source coverage
        entry: bash
        args:
          - -c
          - PYTHONPATH=src BOT_TEST_GATE_MODE=pre-push UV_CACHE_DIR=.uv-cache uv run --extra dev python -m bot.test_gate
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
