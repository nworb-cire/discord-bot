x-app-environment: &app-environment
  DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN:-}"
  BOOKCLUB_CHANNEL_ID: "${BOOKCLUB_CHANNEL_ID:-0}"
  BOOKCLUB_NOM_CHANNEL_ID: "${BOOKCLUB_NOM_CHANNEL_ID:-0}"
  BOOKCLUB_RESULTS_CHANNEL_ID: "${BOOKCLUB_RESULTS_CHANNEL_ID:-0}"
  BOOKCLUB_ROLE_ID: "${BOOKCLUB_ROLE_ID:-0}"
  VOTE_WEIGHT_INNER: "${VOTE_WEIGHT_INNER:-100}"
  VOTE_WEIGHT_OUTER: "${VOTE_WEIGHT_OUTER:-30}"
  OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
  OPENAI_BOOK_LOOKUP_MODEL: "${OPENAI_BOOK_LOOKUP_MODEL:-gpt-5-mini}"
  GOOGLE_SERVICE_ACCOUNT_EMAIL: "${GOOGLE_SERVICE_ACCOUNT_EMAIL:-}"
  GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: "${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY:-}"
  GOOGLE_CALENDAR_ID: "${GOOGLE_CALENDAR_ID:-}"
  DISCORD_GUILD_ID: "${DISCORD_GUILD_ID:-}"
  DATABASE_URL: "${DATABASE_URL:-postgresql+asyncpg://bookclub:bookclub@db:5432/bookclub}" # pragma: allowlist secret
  REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
  PREDICTIONS_CHANNEL_ID: "${PREDICTIONS_CHANNEL_ID:-0}"
  STAGING: "${STAGING:-false}"
  BOOK_MAX_ELECTION_APPEARANCES: "${BOOK_MAX_ELECTION_APPEARANCES:-3}"
  NOMINATION_REACTION_REFRESH_DEBOUNCE_SECONDS: "${NOMINATION_REACTION_REFRESH_DEBOUNCE_SECONDS:-1.0}"

services:
  bot:
    image: ghcr.io/nworb-cire/bookclub-bot:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *app-environment

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookclub
      POSTGRES_PASSWORD: bookclub
      POSTGRES_DB: bookclub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookclub"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  migrate:
    image: ghcr.io/nworb-cire/bookclub-bot:latest
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    command: "alembic upgrade head"
    restart: "no"
    environment:
      <<: *app-environment


volumes:
  pgdata:
  redisdata:
